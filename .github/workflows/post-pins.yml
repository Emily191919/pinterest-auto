name: Post Pinterest Pins

on:
  # 台湾时间 09:00 / 12:00 / 15:00 / 18:00 / 21:00（UTC+8）
  schedule:
    - cron: "0 1 * * *"   # 台湾 09:00
    - cron: "0 4 * * *"   # 台湾 12:00
    - cron: "0 7 * * *"   # 台湾 15:00
    - cron: "0 10 * * *"  # 台湾 18:00
    - cron: "0 13 * * *"  # 台湾 21:00

  # 也可以在 Actions 页面手动触发，并选择参数
  workflow_dispatch:
    inputs:
      limit:
        description: "每次最多发几个 Pin (0 = 不限)"
        required: false
        default: "5"
      dry_run:
        description: "Dry run（只分析，不发布）"
        type: boolean
        required: false
        default: false

jobs:
  post-pins:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # 需要 commit posted_images.json 回 repo

    steps:
      # ── 1. Checkout 代码 ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. posted_images.json 和 images/ 都在 repo 里，checkout 后直接可用 ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ── 3. 安装依赖 ─────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. 运行主脚本 ───────────────────────────────────────────────────────
      - name: Run Pinterest auto-poster
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          ETSY_SHOP_NAME: ${{ secrets.ETSY_SHOP_NAME }}
          ETSY_SHOP_URL: ${{ secrets.ETSY_SHOP_URL }}
          IMAGE_FOLDER: ./images
          DELAY_BETWEEN_PINS: "5"
        run: |
          LIMIT="${{ github.event.inputs.limit || '5' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          ARGS="--limit $LIMIT"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python main.py $ARGS

      # ── 5. 把 posted_images.json commit 回 repo（供 cleanup workflow 读取）──
      - name: Commit posted_images.json
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_images.json || true
          git diff --cached --quiet || git commit -m "chore: update posted_images.json [skip ci]"
          git push
