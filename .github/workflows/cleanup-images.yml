name: Cleanup Posted Images

on:
  # 每 7 天（每周一 UTC 02:00 / 台湾时间 10:00）清理
  schedule:
    - cron: "0 2 * * 1"

  # 支持手动触发（用于测试或紧急清理）
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write   # 需要推送 commit

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 删除已发布的图片，并重置记录 ────────────────────────────────────
      - name: Delete posted images
        id: cleanup
        run: |
          if [ ! -f posted_images.json ]; then
            echo "posted_images.json not found, nothing to clean."
            echo "deleted=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 读取已发布文件名列表（JSON 数组）
          mapfile -t FILES < <(python3 -c "
          import json, sys
          data = json.load(open('posted_images.json'))
          for f in data:
              print(f)
          ")

          COUNT=0
          for FILE in "${FILES[@]}"; do
            TARGET="images/$FILE"
            if [ -f "$TARGET" ]; then
              rm "$TARGET"
              echo "  Deleted: $TARGET"
              COUNT=$((COUNT + 1))
            else
              echo "  Skip (not found): $TARGET"
            fi
          done

          # 重置记录（下一轮从头开始）
          echo "[]" > posted_images.json

          echo "deleted=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Deleted $COUNT image(s)."

      # ── 3. Commit 变更 ───────────────────────────────────────────────────────
      - name: Commit cleanup
        if: steps.cleanup.outputs.deleted != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/ posted_images.json
          git diff --cached --quiet && echo "Nothing to commit." && exit 0
          git commit -m "chore: weekly cleanup — removed ${{ steps.cleanup.outputs.deleted }} posted image(s) [skip ci]"
          git push

      # ── 4. 打印摘要 ──────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "### Cleanup complete" >> "$GITHUB_STEP_SUMMARY"
          echo "Deleted **${{ steps.cleanup.outputs.deleted }}** posted image(s) from \`images/\`." >> "$GITHUB_STEP_SUMMARY"
          echo "posted_images.json has been reset." >> "$GITHUB_STEP_SUMMARY"
